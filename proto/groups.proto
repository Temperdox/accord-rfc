// =============================================================================
// groups.proto - Channel/group lifecycle and membership management.
// =============================================================================
//
// Covers both chat models:
// * Public groups - created freely; membership/roles managed server-side.
// * Private groups - creation carries the initial MLS Commit + Welcomes so
// the server can bootstrap the group as an opaque relay (the server stores
// metadata only; the cryptographic group lives on the clients).
//
// Roles (public chats, ARCHITECTURE section 4.1): owner > admin > moderator > member
// > read-only.
// =============================================================================
syntax = "proto3";
package accord;

import "common.proto";
import "mls.proto"; // for WelcomeTarget (private group creation carries Welcomes)

service GroupService {
  rpc CreatePublicGroup(CreatePublicGroupRequest) returns (CreateGroupResponse);
  rpc CreatePrivateGroup(CreatePrivateGroupRequest) returns (CreateGroupResponse);
  rpc AddMembers(AddMembersRequest) returns (AddMembersResponse);
  rpc RemoveMembers(RemoveMembersRequest) returns (RemoveMembersResponse);
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc GetGroupInfo(GetGroupInfoRequest) returns (GetGroupInfoResponse);
  // Tavern (server) administration. See groups/service.rs; gated by RBAC perms
  // and the guardrail/auto-mod layer (rate-limit + audit + alert).
  rpc DeleteGroup(DeleteGroupRequest) returns (DeleteGroupResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc GetTavern(GetTavernRequest) returns (TavernInfo);
  rpc UpdateTavern(UpdateTavernRequest) returns (TavernInfo);
  // Moderation. Kick = remove membership; Ban = kick + a persistent bans row
  // (account-level now; the cryptographic ban-tag is a later layer, BAN-PLAN.md).
  rpc KickMember(KickMemberRequest) returns (KickMemberResponse);
  rpc BanMember(BanMemberRequest) returns (BanMemberResponse);
  rpc UnbanMember(UnbanMemberRequest) returns (UnbanMemberResponse);
  rpc ListBans(ListBansRequest) returns (ListBansResponse);
  // Moderation audit log (guardrail outcomes + admin actions). MANAGE_SERVER.
  rpc ListAudit(ListAuditRequest) returns (ListAuditResponse);
}

message ListAuditRequest {
  uint32 limit = 1;
}
message ListAuditResponse {
  repeated AuditEntry entries = 1;
}
message AuditEntry {
  UserId actor_id = 1;
  string action = 2;
  string target = 3;
  string verdict = 4;
  string reason = 5;
  int64 created_at_ms = 6;
}

message CreatePublicGroupRequest {
  string name = 1;
  string description = 2;
  // "text" (default) or "voice". Distinct from ChatKind (public/private), which
  // is the *encryption* model; channel_kind is the channel's *behaviour*.
  string channel_kind = 3;
}

message CreatePrivateGroupRequest {
  string name = 1;
  repeated UserId member_ids = 2;
  // The MLS Commit that creates the group with all initial members added.
  bytes initial_commit = 3;
  // One Welcome per added device.
  repeated WelcomeTarget welcomes = 4;
  // Client-chosen group id. The client creates the MLS group locally first (to
  // produce the Welcomes), so it picks the id; the server adopts it. The MLS
  // group id is exactly this UUID's 16 bytes, keeping client/server in sync.
  GroupId group_id = 5;
}

message CreateGroupResponse {
  GroupId group_id = 1;
}

message AddMembersRequest {
  GroupId group_id = 1;
  repeated UserId member_ids = 2;
}

message AddMembersResponse {}

message RemoveMembersRequest {
  GroupId group_id = 1;
  repeated UserId member_ids = 2;
}

message RemoveMembersResponse {}

message ListGroupsRequest {}

message ListGroupsResponse {
  repeated GroupSummary groups = 1;
}

message GroupSummary {
  GroupId group_id = 1;
  string name = 2;
  ChatKind kind = 3;
  uint32 member_count = 4;
  // "text" or "voice" (see CreatePublicGroupRequest.channel_kind).
  string channel_kind = 5;
}

message GetGroupInfoRequest {
  GroupId group_id = 1;
}

message GetGroupInfoResponse {
  GroupSummary summary = 1;
  string description = 2;
  repeated UserId member_ids = 3;
}

// ---- Channel deletion ------------------------------------------------------

message DeleteGroupRequest {
  GroupId group_id = 1;
}
message DeleteGroupResponse {}

// ---- Member listing --------------------------------------------------------

message ListMembersRequest {
  GroupId group_id = 1;
}

message ListMembersResponse {
  repeated MemberInfo members = 1;
}

message MemberInfo {
  UserId user_id = 1;
  string username = 2;
  string display_name = 3;
  bool is_owner = 4;
  // Best-effort: at least one of the member's devices has a live stream open.
  bool online = 5;
  // Role ids assigned to this member (decimal-string perms live on the Role).
  repeated string role_ids = 6;
}

// ---- Tavern (server) identity ----------------------------------------------

message GetTavernRequest {}

message TavernInfo {
  string name = 1;
  // icon_url / banner_url hold small inline base64 data URLs, or "" for none.
  string icon_url = 2;
  string description = 3;
  // BAN-PLAN.md Layer-2 per-server account-linking toggle. Placeholder for now
  // (the cryptographic ban-tag system is a later layer); surfaced so the UI and
  // schema already carry it.
  bool linking_enabled = 4;
  string banner_url = 5;
}

message UpdateTavernRequest {
  string name = 1;
  string icon_url = 2;
  string description = 3;
  string banner_url = 4;
}

// ---- Moderation (kick / ban) -----------------------------------------------

message KickMemberRequest {
  GroupId group_id = 1;
  UserId user_id = 2;
}
message KickMemberResponse {}

message BanMemberRequest {
  UserId user_id = 1;
  string reason = 2;
}
message BanMemberResponse {}

message UnbanMemberRequest {
  UserId user_id = 1;
}
message UnbanMemberResponse {}

message ListBansRequest {}
message ListBansResponse {
  repeated BanInfo bans = 1;
}

message BanInfo {
  UserId user_id = 1;
  string reason = 2;
  UserId banned_by = 3;
  int64 created_at_ms = 4;
}
