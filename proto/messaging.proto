// =============================================================================
// messaging.proto - Real-time message transport (the heart of Accord).
// =============================================================================
//
// The primary channel is `MessageStream`, a *bidirectional* gRPC stream opened
// once per device on login (see ARCHITECTURE section 7.3). The client sends
// `ClientMessage`s up; the server pushes `ServerMessage`s down - incoming
// messages, MLS handshake notifications, typing, and presence.
//
// Public vs private (ARCHITECTURE section 4):
// * Public -> `content` is plaintext; the server stores and fans it out.
// * Private -> `mls_ciphertext` is opaque; the server only relays bytes.
//
// Idempotency: clients stamp every outbound message with a UUIDv7
// `client_message_id`; the server deduplicates on it (ARCHITECTURE section 7.4).
// =============================================================================
syntax = "proto3";
package accord;

import "common.proto";
import "google/protobuf/timestamp.proto";

service MessagingService {
  // Long-lived bidirectional stream carrying all real-time traffic.
  rpc MessageStream(stream ClientMessage) returns (stream ServerMessage);
  // Paginated history for a public channel (plaintext, server-served).
  rpc FetchPublicHistory(FetchHistoryRequest) returns (FetchPublicHistoryResponse);
  // Paginated history for a private group (ciphertext blobs, client-decrypted).
  rpc FetchPrivateHistory(FetchHistoryRequest) returns (FetchPrivateHistoryResponse);
}

// ---- Client -> Server ------------------------------------------------------

message ClientMessage {
  oneof payload {
    SendPublicMessage public_message = 1;
    SendPrivateMessage private_message = 2;
    TypingIndicator typing = 3;
    Ack ack = 4;
    // Voice/video (scaffold): WebRTC signaling relayed peer-to-peer and a
    // join/leave/mute/cam/screen state update. Media itself is P2P (DTLS-SRTP)
    // and never touches the server; `data` below is opaque, like MLS ciphertext.
    VoiceSignal voice_signal = 5;
    VoiceStateUpdate voice_state = 6;
  }
}

message SendPublicMessage {
  GroupId group_id = 1;
  string content = 2;
  MessageId client_message_id = 3;
}

message SendPrivateMessage {
  GroupId group_id = 1;
  bytes mls_ciphertext = 2;
  uint64 epoch = 3;
  MessageId client_message_id = 4;
}

message TypingIndicator {
  GroupId group_id = 1;
  bool is_typing = 2;
}

// Acknowledges receipt of a delivered message so the server can clear it from
// the device's offline queue.
message Ack {
  uint64 sequence_number = 1;
  GroupId group_id = 2;
}

// ---- Server -> Client ------------------------------------------------------

message ServerMessage {
  oneof payload {
    IncomingPublicMessage public_message = 1;
    IncomingPrivateMessage private_message = 2;
    MlsCommitNotification commit_notification = 3;
    MlsWelcomeNotification welcome_notification = 4;
    TypingIndicator typing = 5;
    PresenceUpdate presence = 6;
    // Voice/video (scaffold): a relayed signaling envelope, a channel-wide
    // participant state change, and a moderation alert to owner/admins.
    VoiceSignal voice_signal = 7;
    VoiceParticipant voice_participant = 8;
    ModAlert mod_alert = 9;
  }
}

message IncomingPublicMessage {
  MessageId message_id = 1;
  GroupId group_id = 2;
  UserId sender_id = 3;
  string sender_display_name = 4;
  string content = 5;
  google.protobuf.Timestamp timestamp = 6;
  uint64 sequence_number = 7;
}

message IncomingPrivateMessage {
  GroupId group_id = 1;
  UserId sender_id = 2;
  bytes mls_ciphertext = 3;
  uint64 epoch = 4;
  google.protobuf.Timestamp timestamp = 5;
  uint64 sequence_number = 6;
}

// Notifies a member that the group epoch advanced (someone committed).
message MlsCommitNotification {
  GroupId group_id = 1;
  bytes commit = 2;
  uint64 epoch = 3;
}

// Delivered to a newly added device so it can join an existing group.
message MlsWelcomeNotification {
  GroupId group_id = 1;
  bytes welcome = 2;
}

message PresenceUpdate {
  UserId user_id = 1;
  bool online = 2;
  google.protobuf.Timestamp last_seen = 3;
}

// ---- History ---------------------------------------------------------------

message FetchHistoryRequest {
  GroupId group_id = 1;
  // Return messages strictly older than this sequence number (for paging up).
  // Zero means "from the newest".
  uint64 before_sequence = 2;
  uint32 limit = 3;
}

message FetchPublicHistoryResponse {
  repeated IncomingPublicMessage messages = 1;
}

message FetchPrivateHistoryResponse {
  repeated IncomingPrivateMessage messages = 1;
}

// ---- Voice/video (scaffold) ------------------------------------------------
//
// Transport: WebRTC P2P in the client webview (RTCPeerConnection +
// getUserMedia/getDisplayMedia). The server is a *signaling relay only* - it
// forwards `VoiceSignal` envelopes verbatim between member devices and never
// inspects `data`, preserving the §5 crypto boundary (media is DTLS-SRTP P2P).
// Live media wiring is a later phase; these types are the seam.

// A point-to-point WebRTC signaling message relayed through the server.
message VoiceSignal {
  GroupId group_id = 1;
  DeviceId from_device = 2;   // set by the server on relay
  DeviceId target_device = 3; // recipient device for this offer/answer/candidate
  SignalKind kind = 4;
  bytes data = 5; // opaque SDP / ICE payload; never inspected by the server
}

enum SignalKind {
  SIGNAL_KIND_UNSPECIFIED = 0;
  SIGNAL_KIND_SDP_OFFER = 1;
  SIGNAL_KIND_SDP_ANSWER = 2;
  SIGNAL_KIND_ICE_CANDIDATE = 3;
}

// Client -> server: this device's voice state in a voice channel.
message VoiceStateUpdate {
  GroupId group_id = 1;
  bool joined = 2; // false = leaving
  bool muted = 3;
  bool camera_on = 4;
  bool screen_on = 5;
}

// Server -> channel members: a participant's voice state changed (also sent as
// a burst to a newcomer so it learns who to negotiate with).
message VoiceParticipant {
  GroupId group_id = 1;
  UserId user_id = 2;
  DeviceId device_id = 3;
  bool joined = 4;
  bool muted = 5;
  bool camera_on = 6;
  bool screen_on = 7;
}

// ---- Moderation alerts -----------------------------------------------------
//
// Emitted by the guardrail/auto-mod layer to connected owner/admin devices when
// a privileged action is throttled, denied, or flagged hostile (see
// src/guardrails/). Lets other admins/owner witness hostile attempts live.
message ModAlert {
  UserId actor_id = 1;
  string action = 2; // ActionClass, e.g. "delete_channel"
  string target = 3; // affected entity (channel/user id or name)
  string reason = 4;
  Severity severity = 5;
  google.protobuf.Timestamp timestamp = 6;
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO = 1;
  SEVERITY_WARN = 2;
  SEVERITY_HOSTILE = 3;
}
